<h2>MCP Configuration</h2>
<p class="muted">
    Authentication successful. Your session is saved on the server.<br>
    Copy or download the configuration below to use in your MCP client or AI IDE.
</p>

<div class="card mb-sm">
    <pre id="mcp-config-pre" class="pre-wrap">{{ config_json }}</pre>
</div>

<div class="setup-actions">
    <form action="/download-config/{{ token }}" method="get" class="form-inline">
        <button type="submit">Download JSON</button>
    </form>
    <button type="button" id="copyBtn"
        onclick="(async ()=>{const btn=document.getElementById('copyBtn'); const pre=document.getElementById('mcp-config-pre'); const prev=btn.innerText; try{if(!pre){throw new Error('Config block not found');} await navigator.clipboard.writeText(pre.innerText); btn.innerText='Copied';}catch(_){btn.innerText='Copy failed';} setTimeout(()=>btn.innerText=prev, 2000);})()">Copy
        to Clipboard</button>
    <button type="button" onclick="window.location.assign('/setup')">Back to setup</button>
</div>
