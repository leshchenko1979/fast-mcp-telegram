<h2>Success</h2>
<p class="muted">{{ message }}</p>

{% if token %}
<div class="card mt-block">
    <strong>Your bearer token:</strong><br>
    <code class="token-display">{{ token }}</code>
</div>

<p class="muted">
    You can now use this token in your MCP client configuration.
    Your session has been reauthorized and is ready to use.
</p>
{% endif %}

<div class="setup-actions">
    <button type="button" onclick="window.location.assign('/setup')">Back to setup</button>
</div>
