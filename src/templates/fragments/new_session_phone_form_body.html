<h2 id="new-session-heading">Create New Session</h2>
{% include "fragments/inline_error.html" %}
<p class="muted">Enter your phone number to authenticate with Telegram.</p>
<p class="muted">Use international format with country code, for example: +14155552671.</p>

<form hx-post="/setup/phone" hx-target="#setup-flow" hx-swap="innerHTML">
    <label for="phone">Phone number</label>
    <input id="phone" name="phone" type="tel" inputmode="tel" placeholder="+1234567890" required />
    <button type="submit">Send Code</button>
</form>
